# ── Resilience4j Circuit Breaker ─────────────────────────────────────

# CB: factus-token (autenticación — más tolerante)
resilience4j.circuitbreaker.instances.factus-token.sliding-window-size=5
resilience4j.circuitbreaker.instances.factus-token.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.factus-token.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.factus-token.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.factus-token.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.factus-token.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.factus-token.register-health-indicator=true

# CB: factus-bill (generar factura — más estricto)
resilience4j.circuitbreaker.instances.factus-bill.sliding-window-size=10
resilience4j.circuitbreaker.instances.factus-bill.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.factus-bill.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.factus-bill.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.factus-bill.slow-call-duration-threshold=8s
resilience4j.circuitbreaker.instances.factus-bill.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.factus-bill.register-health-indicator=true

# ── Resilience4j Retry ────────────────────────────────────────────────

# Retry: factus-token (3 intentos, backoff exponencial 1s → 2s → 4s)
resilience4j.retry.instances.factus-token.max-attempts=3
resilience4j.retry.instances.factus-token.wait-duration=1s
resilience4j.retry.instances.factus-token.enable-exponential-backoff=true
resilience4j.retry.instances.factus-token.exponential-backoff-multiplier=2
resilience4j.retry.instances.factus-token.retry-exceptions[0]=java.net.SocketTimeoutException
resilience4j.retry.instances.factus-token.retry-exceptions[1]=java.net.ConnectException
resilience4j.retry.instances.factus-token.retry-exceptions[2]=org.springframework.web.client.ResourceAccessException
resilience4j.retry.instances.factus-token.retry-exceptions[3]=org.springframework.web.client.HttpServerErrorException

# Retry: factus-bill (2 intentos — conservador para evitar facturas duplicadas)
resilience4j.retry.instances.factus-bill.max-attempts=2
resilience4j.retry.instances.factus-bill.wait-duration=2s
resilience4j.retry.instances.factus-bill.retry-exceptions[0]=java.net.SocketTimeoutException
resilience4j.retry.instances.factus-bill.retry-exceptions[1]=java.net.ConnectException
resilience4j.retry.instances.factus-bill.retry-exceptions[2]=org.springframework.web.client.ResourceAccessException

# ── Resilience4j TimeLimiter ──────────────────────────────────────────
resilience4j.timelimiter.instances.factus-token.timeout-duration=5s
resilience4j.timelimiter.instances.factus-bill.timeout-duration=10s

# ── Actuator — health y métricas de los circuit breakers ─────────────
management.endpoints.web.exposure.include=health,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true